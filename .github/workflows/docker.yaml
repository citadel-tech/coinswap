name: Docker CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  docker-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker images
      run: ./docker-setup.sh build

    - name: Test makerd
      run: docker run --rm coinswap-maker makerd --help

    - name: Test taker
      run: docker run --rm coinswap-taker taker --help

    - name: Test tracker
      run: docker run --rm coinswap-tracker tracker --help

    - name: Run integration tests
      run: docker run --rm coinswap-test